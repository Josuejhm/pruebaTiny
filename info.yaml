# Tiny Tapeout project information
project:
  title:        "SPI Slave 8-bit"
  author:       "Ronald"
  discord:      ""
  description:  "SPI Slave de 8 bits, modo 0 (CPOL=0 CPHA=0)"
  language:     "SystemVerilog"
  clock_hz:     50000000

  tiles: "1x1"

  top_module:  "tt_um_example"

  source_files:
    - "spi_slave.sv"        # ← primero el módulo base
    - "tt_um_example.sv"    # ← luego el wrapper

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "sck"
  ui[1]: "cs_n"
  ui[2]: "mosi"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "rx_data[0]"
  uo[1]: "rx_data[1]"
  uo[2]: "rx_data[2]"
  uo[3]: "rx_data[3]"
  uo[4]: "rx_data[4]"
  uo[5]: "rx_data[5]"
  uo[6]: "rx_data[6]"
  uo[7]: "rx_data[7]"

  # Bidirectional pins
  uio[0]: "miso"
  uio[1]: "rx_valid"
  uio[2]: "tx_data[2]"
  uio[3]: "tx_data[3]"
  uio[4]: "tx_data[4]"
  uio[5]: "tx_data[5]"
  uio[6]: "tx_data[6]"
  uio[7]: "tx_data[7]"

# Do not change!
yaml_version: 6